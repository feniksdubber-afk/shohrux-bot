name: Mentor Bot Run

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: fofobrian/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install aiogram requests
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python main.py
